name: Tests
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  code-tests:
    name: Code
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Differential ShellCheck requires full git history
          fetch-depth: 0

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        if: github.event_name == 'pull_request'

      - id: ShellCheck
        name: Differential ShellCheck
        uses: redhat-plumbers-in-action/differential-shellcheck@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'pull_request'

      - name: Upload artifact with ShellCheck defects in SARIF format
        uses: actions/upload-artifact@v7
        with:
          name: Differential ShellCheck SARIF
          path: ${{ steps.ShellCheck.outputs.sarif }}
        if: github.event_name == 'pull_request'

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Fix repository permissions
        run: |
          sudo chown -R $(id -u):$(id -g) .

      - name: Check compatible min Go version
        run: |
          cd incus-osd
          go mod tidy

      - name: Download go dependencies
        run: |
          cd incus-osd
          go mod download

      - name: Run test build
        run: |
          ./scripts/test/generate-test-certificates.sh
          cd incus-osd
          go build ./cmd/incus-osd

      - name: Run static analysis
        run: |
          make static-analysis

      - name: Run unit tests
        run: |
          cd incus-osd
          go test -v ./...

  end-to-end:
    name: End to end testing
    strategy:
      fail-fast: false
    timeout-minutes: 120
    runs-on:
      - self-hosted
      - arch-amd64
      - lxc-incusos-test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install dependencies
        run: |
          sudo apt-get install --yes \
            binutils \
            debian-archive-keyring \
            devscripts \
            efitools \
            libnbd-dev \
            make \
            mtools \
            pkgconf \
            pipx \
            qemu-utils

      - name: Setup Incus
        run: |
          curl https://pkgs.zabbly.com/get/incus-daily | sudo sh
          sudo chmod 666 /var/lib/incus/unix.socket
          incus admin init --auto

      - name: Setup mkosi
        run: |
          pipx install git+https://github.com/systemd/mkosi.git@v25.3

      - name: Build initial image
        run: |
          export PATH=${PATH}:${HOME}/.local/bin
          make

      - name: Start the VM
        run: |
          OSNAME=$(grep "ImageId=" mkosi.conf | cut -d '=' -f 2)
          RAW_IMAGE=$(ls mkosi.output/${OSNAME}_*.raw | grep -v usr | grep -v esp | sort | tail -1)

          echo '{"applications":[{"name":"incus"},{"name":"debug"}]}' > applications.json
          echo '{"name":"debug"}' > provider.json
          tar cf seed.tar applications.json provider.json
          sudo dd if=seed.tar of=${RAW_IMAGE} seek=4196352 bs=512 conv=notrunc

          qemu-img convert -f raw -O qcow2 ${RAW_IMAGE} os-image.qcow2
          incus image import --alias incus-os test/metadata.tar.xz os-image.qcow2

          incus create --quiet --vm incus-os test-incus-os \
            -c security.secureboot=false \
            -c limits.cpu=2 \
            -c limits.memory=2GiB \
            -d root,size=50GiB
          incus config device add test-incus-os vtpm tpm
          incus config set test-incus-os systemd.credential.fully-enable-incus-agent=true
          incus start test-incus-os

          incus wait test-incus-os agent --timeout 300

          sleep 1m

          incus list

      - name: Prepare incus-osd environment
        run: |
          RELEASE=$(ls mkosi.output/*.efi | sed -e "s/.*_//g" -e "s/.efi//g" | sort -n | tail -1)

          incus exec test-incus-os -- mkdir -p /root/updates
          echo ${RELEASE} | incus file push --quiet - test-incus-os/root/updates/RELEASE

      - name: Load the extensions
        run: |
          incus file push --quiet mkosi.output/debug.raw test-incus-os/root/updates/
          incus file push --quiet mkosi.output/incus.raw test-incus-os/root/updates/

          incus exec test-incus-os -- curl --unix-socket /run/incus-os/unix.socket http://localhost/1.0/system/update/:check -X POST

          sleep 3m

          incus exec test-incus-os -- journalctl -u incus-osd -b0

      - name: Test Incus
        run: |
          incus exec test-incus-os -- incus admin init --auto
          incus exec test-incus-os -- incus launch --quiet images:debian/13 c1
          incus exec test-incus-os -- incus launch --quiet images:debian/13 v1 --vm

          incus exec test-incus-os -- sleep 30s
          incus exec test-incus-os -- incus list

      - name: Test EFI db and dbx updates
        run: |
          pushd certs/efi/updates/ && tar cf SecureBootKeys_${RELEASE}.tar *.auth && popd
          incus file push certs/efi/updates/*.tar test-incus-os/root/updates/
          incus exec test-incus-os -- curl --unix-socket /run/incus-os/unix.socket http://localhost/1.0/system/update/:check -X POST

          sleep 30s

          incus exec test-incus-os -- curl --unix-socket /run/incus-os/unix.socket http://localhost/1.0/system/:reboot -X POST

      - name: Build a newer version of the image
        run: |
          export PATH=${PATH}:${HOME}/.local/bin
          ./scripts/test/switch-secure-boot-signing-key.sh 2
          make

      - name: Apply the update
        run: |
          RELEASE=$(ls mkosi.output/*.efi | sed -e "s/.*_//g" -e "s/.efi//g" | sort -n | tail -1)
          OSNAME=$(grep "ImageId=" mkosi.conf | cut -d '=' -f 2)

          echo ${RELEASE} | incus file push --quiet - test-incus-os/root/updates/RELEASE
          incus file push --quiet mkosi.output/${OSNAME}_${RELEASE}.efi test-incus-os/root/updates/
          incus file push --quiet mkosi.output/${OSNAME}_${RELEASE}.usr* test-incus-os/root/updates/

          incus exec test-incus-os -- curl --unix-socket /run/incus-os/unix.socket http://localhost/1.0/system/update/:check -X POST

          sleep 3m

          incus exec test-incus-os -- journalctl -u incus-osd -b0

          incus exec test-incus-os -- curl --unix-socket /run/incus-os/unix.socket http://localhost/1.0/system/:reboot -X POST

          sleep 3m

          incus exec test-incus-os -- grep $RELEASE /usr/lib/os-release

  documentation:
    name: Documentation
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-tags: true

      - name: Install dependencies
        run: |
          sudo apt-get install -y aspell aspell-en ruby
          sudo gem install --no-document mdl

      - name: Run markdown linter
        run: |
          make doc-lint

      - name: Run spell checker
        run: |
          make doc-spellcheck

      - name: Run inclusive naming checker
        uses: get-woke/woke-action@v0
        with:
          fail-on-error: true
          woke-args: "*.md **/*.md -c https://github.com/canonical/Inclusive-naming/raw/main/config.yml"

      - name: Run link checker
        run: |
          make doc-linkcheck

      - name: Build docs (Sphinx)
        run: make doc

      - name: Print warnings (Sphinx)
        run: if [ -s doc/.sphinx/warnings.txt ]; then cat doc/.sphinx/warnings.txt; exit 1; fi

      - name: Upload documentation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: doc/html
